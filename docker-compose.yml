# ─────────────────────────────────────────────────────────────
# Naman Puja — full local stack, connected to the LIVE cloud Supabase.
#
#   cd backend-namanpuja
#   cp .env.docker.example .env.docker     # then fill in the real secrets (once)
#   docker compose up --build
#
# Everyone who runs this shares the SAME live database (cloud Supabase, Mumbai)
# and the same Atomic CRM data. No local Postgres needed.
#
# Assumes the four repos are cloned as siblings:
#   namanpuja/
#   ├── backend-namanpuja/   ← run docker compose from here
#   ├── frontend-namanpuja/
#   ├── adminpanel-namanpuja/
#   └── crm-namanpuja/
#
# Ports:  website :3000 · admin :5173 · CRM :5174 · API :4000
# Logins: admin@namanpuja.com / ChangeMe123!
#
# ⚠️  Secrets (DB password, service-role key) live ONLY in .env.docker, which is
#     gitignored. Never commit real values. Share .env.docker privately.
# ─────────────────────────────────────────────────────────────
name: namanpuja

services:
  backend:
    build:
      context: .
    # DB + Supabase secrets come from the gitignored .env.docker file.
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      PORT: "4000"
      CORS_ORIGINS: http://localhost:3000,http://localhost:5173,http://localhost:5174
    # Apply any pending committed migrations (idempotent), then run the API.
    # No seed here — the cloud DB is already seeded; re-seeding would reset
    # edited content. Run `npm run db:seed` manually only when intended.
    command: sh -c "npx prisma migrate deploy && npm run dev"
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ../frontend-namanpuja
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      API_INTERNAL_URL: http://backend:4000/api
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin:
    build:
      context: ../adminpanel-namanpuja
    environment:
      VITE_API_URL: http://localhost:4000/api/admin
    ports:
      - "5173:5173"
    depends_on:
      - backend

  crm:
    build:
      context: ../crm-namanpuja
    # These are public (browser) values, safe to commit. The CRM talks directly
    # to the live Supabase, protected by Row-Level Security.
    environment:
      VITE_SUPABASE_URL: https://iuwjdkgzhvxpuslvjfzp.supabase.co
      VITE_SB_PUBLISHABLE_KEY: sb_publishable_j2usXK0P-L0zUSt8KDnOSA_jDR8K1Qm
      VITE_IS_DEMO: "false"
      VITE_INBOUND_EMAIL: 2aff30e603e54dc3eb556bd9e03ee099@inbound.postmarkapp.com
      VITE_ATTACHMENTS_BUCKET: attachments
    ports:
      - "5174:5174"
